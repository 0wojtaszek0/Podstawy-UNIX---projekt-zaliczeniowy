# Tablica katalogów/plików źródłowych do skopiowania.
# Każdy element w osobnym cudzysłowie. Bez końcowego ukośnika.
SRC_DIRS=(
    # "/sciezka/do/folderu"
    # "/sciezka/do/folderu2"
)
# Katalog docelowy, w którym powstają katalogi backup_YYYYMMDD_HHMMSS.
# Domyślnie w $HOME, aby działało bez uprawnień roota. Do produkcyjnego użycia
# wskaż osobny dysk/partycję (hardlinki wymagają jednego systemu plików w
# obrębie DEST_DIR — i tak jest to zapewnione).
DEST_DIR=(
    # "/sciezka/gdzie/mazostac/zapisana/kopia"
)
# Maksymalna liczba przechowywanych wersji kopii. Starsze będą usuwane.
MAX_BACKUPS=5
# Plik logu (katalog zostanie utworzony automatycznie, jeśli nie istnieje).
LOG_FILE=(
    # "/sciezka/do/folderu/backups/logs/backup.log"
)
# Plik blokady zapobiegający równoległemu uruchomieniu dwóch instancji.
LOCK_FILE="/tmp/backup.lock"
